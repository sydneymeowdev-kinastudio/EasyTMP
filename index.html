<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Easytmp — Money Manage By Kina Studio</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1450.0.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="icon" href="data:;base64,iVBORw0KGgo=">

<style>
/* ─── BASE ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{font-family:'Prompt',sans-serif;background:#f0f4f8;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ─── ANIMATIONS ─── */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes toast{0%{opacity:0;transform:translateY(20px) scale(.95)}15%,85%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-10px) scale(.95)}}

.anim-fadeIn{animation:fadeIn .4s ease both;}
.anim-slideUp{animation:slideUp .45s cubic-bezier(.22,1,.36,1) both;}
.anim-scaleIn{animation:scaleIn .3s cubic-bezier(.22,1,.36,1) both;}
.anim-rowIn{animation:rowIn .3s ease both;}

/* ─── AUTH ─── */
.auth-bg{
  min-height:100vh;
  background:linear-gradient(135deg,#e8f5e9 0%,#f3e5f5 50%,#e3f2fd 100%);
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
.auth-card{
  background:#fff;border-radius:28px;
  box-shadow:0 24px 80px rgba(0,0,0,.13);
  padding:2.5rem 2rem;width:100%;max-width:440px;
  animation:scaleIn .4s cubic-bezier(.22,1,.36,1) both;
}
.auth-logo{text-align:center;margin-bottom:1.5rem;}
.auth-logo h2{font-weight:900;color:#2e7d32;letter-spacing:-0.03em;font-size:2rem;}
.auth-logo p{font-size:.75rem;color:#aaa;margin-top:2px;}
.auth-tabs{display:flex;background:#f5f5f5;border-radius:14px;padding:5px;margin-bottom:1.75rem;gap:5px;}
.auth-tab{
  flex:1;padding:.6rem;border:none;background:transparent;
  border-radius:10px;font-family:'Prompt',sans-serif;font-size:.9rem;
  font-weight:500;color:#888;cursor:pointer;transition:all .25s;
}
.auth-tab.active{background:#fff;color:#2e7d32;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.1);}

/* ─── FIELD ─── */
.field-group{margin-bottom:1rem;}
.field-label{display:block;font-size:.8rem;font-weight:600;color:#555;margin-bottom:.4rem;}
.field-label-amber{color:#f57c00;}
.field-hint{font-size:.72rem;color:#aaa;margin-top:.3rem;}
.field-input{
  width:100%;padding:.75rem 1rem;border:2px solid #e8e8e8;border-radius:12px;
  font-family:'Prompt',sans-serif;font-size:.9rem;color:#333;
  transition:border-color .2s,box-shadow .2s;outline:none;background:#fafafa;
}
.field-input:focus{border-color:#4caf50;box-shadow:0 0 0 3px rgba(76,175,80,.15);background:#fff;}
.divider{border:none;border-top:1px solid #f0f0f0;margin:1.1rem 0;}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
  padding:.75rem 1.25rem;border:none;border-radius:12px;
  font-family:'Prompt',sans-serif;font-weight:700;font-size:.9rem;
  cursor:pointer;transition:all .22s;white-space:nowrap;
}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-full{width:100%;}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;}
.btn-green:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(46,125,50,.35);}
.btn-blue{background:linear-gradient(135deg,#42a5f5,#1565c0);color:#fff;}
.btn-blue:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(21,101,192,.35);}
.btn-indigo{background:linear-gradient(135deg,#7c4dff,#512da8);color:#fff;}
.btn-indigo:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(124,77,255,.3);}
.btn-red{background:linear-gradient(135deg,#ef5350,#b71c1c);color:#fff;}
.btn-red:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(183,28,28,.3);}
.btn-ghost{background:#f5f5f5;color:#555;border:2px solid #e8e8e8;}
.btn-ghost:hover:not(:disabled){background:#eee;}
.btn-icon{padding:.5rem;border-radius:8px;font-size:.82rem;}
.btn-edit{background:#e3f2fd;color:#1565c0;}
.btn-edit:hover{background:#bbdefb;}
.btn-del{background:#fce4ec;color:#c62828;}
.btn-del:hover{background:#f8bbd0;}
.btn-logout{
  padding:.6rem 1.3rem;background:#fff1f1;color:#e53935;
  border:2px solid #ffcdd2;border-radius:10px;
  font-family:'Prompt',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;font-size:.88rem;
}
.btn-logout:hover{background:#e53935;color:#fff;border-color:#e53935;}

/* ─── SPINNER ─── */
.spinner{
  display:inline-block;width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
}
.spinner-dark{border-color:rgba(0,0,0,.15);border-top-color:#555;}

/* ─── TOAST ─── */
.toast-wrap{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:.5rem;
  pointer-events:none;
}
.toast{
  padding:.7rem 1.4rem;border-radius:12px;font-size:.88rem;font-weight:600;
  color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.18);
  animation:toast 3s ease forwards;white-space:nowrap;
}
.toast-success{background:linear-gradient(135deg,#43a047,#2e7d32);}
.toast-error{background:linear-gradient(135deg,#ef5350,#b71c1c);}
.toast-info{background:linear-gradient(135deg,#42a5f5,#1565c0);}

/* ─── MODAL ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:1rem;backdrop-filter:blur(4px);
  animation:fadeIn .2s ease both;
}
.modal-box{
  background:#fff;border-radius:24px;padding:2rem;
  width:100%;max-width:480px;
  box-shadow:0 24px 80px rgba(0,0,0,.2);
  animation:scaleIn .3s cubic-bezier(.22,1,.36,1) both;
  max-height:90vh;overflow-y:auto;
}
.modal-title{font-size:1.15rem;font-weight:800;color:#1a1a1a;margin-bottom:1.25rem;}

/* ─── DASHBOARD ─── */
.dash-wrap{max-width:1200px;margin:0 auto;padding:1.25rem;animation:fadeIn .4s ease both;}
.dash-header{
  background:#fff;border-radius:22px;
  box-shadow:0 4px 28px rgba(0,0,0,.07);
  padding:1.4rem 1.75rem;margin-bottom:1.25rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
}
.dash-title{font-size:1.6rem;font-weight:900;color:#1a1a1a;letter-spacing:-.04em;}
.dash-title span{color:#43a047;font-weight:400;font-size:.9rem;}
.dash-company{font-size:1rem;font-weight:600;color:#43a047;margin-top:.15rem;}
.dash-meta{font-size:.73rem;color:#aaa;margin-top:.15rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.badge{display:inline-block;padding:.2rem .55rem;border-radius:6px;font-weight:700;font-size:.72rem;}
.badge-blue{background:#e3f2fd;color:#1565c0;}
.badge-green{background:#e8f5e9;color:#2e7d32;}

.co-logo{width:52px;height:52px;border-radius:12px;object-fit:cover;border:2px solid #e8e8e8;}
.co-logo-placeholder{
  width:52px;height:52px;border-radius:12px;
  background:linear-gradient(135deg,#43a047,#1565c0);
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  flex-shrink:0;
}
